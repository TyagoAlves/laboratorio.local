services:
  mysql:
    image: mysql:8
    container_name: lab-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
    restart: unless-stopped
    networks:
      - lab-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 3s
      retries: 10

  guacd:
    image: guacamole/guacd
    container_name: lab-guacd
    restart: unless-stopped
    networks:
      - lab-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  guacamole:
    image: guacamole/guacamole
    container_name: lab-guacamole
    depends_on:
      guacd:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: mysql
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole_pass}
      # LDAP Authentication (Active Directory)
      LDAP_HOSTNAME: windows
      LDAP_PORT: "389"
      LDAP_ENCRYPTION_METHOD: none
      LDAP_USER_BASE_DN: DC=laboratorio,DC=local
      LDAP_USERNAME_ATTRIBUTE: sAMAccountName
      LDAP_SEARCH_BIND_DN: CN=Administrator,CN=Users,DC=laboratorio,DC=local
      LDAP_SEARCH_BIND_PASSWORD: ${ADMIN_PASSWORD:-SenhaForte@2026}
      LDAP_GROUP_BASE_DN: DC=laboratorio,DC=local
      LDAP_GROUP_NAME_ATTRIBUTE: cn
      LDAP_MEMBER_ATTRIBUTE: member
      LDAP_GROUP_SEARCH_FILTER: "(objectClass=group)"
      LDAP_NESTED_GROUPS: "true"
    restart: unless-stopped
    networks:
      - lab-network

  # ─── MeshCentral ──────────────────────────────────────────
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: lab-meshcentral
    environment:
      HOSTNAME: localhost
      PORT: "443"
      RIGHTS: "1"
    ports:
      - "4430:443"
    volumes:
      - meshcentral_data:/opt/meshcentral/meshcentral-data
    restart: unless-stopped
    networks:
      - lab-network

  cloudflared:
    image: cloudflare/cloudflared
    container_name: lab-cloudflared
    command: tunnel --url http://guacamole:8080/guacamole/
    restart: unless-stopped
    networks:
      - lab-network
    depends_on:
      - guacamole

  meshcloudflared:
    image: cloudflare/cloudflared
    container_name: lab-meshcloudflared
    command: tunnel --url http://meshcentral:3000/
    restart: unless-stopped
    networks:
      - lab-network
    depends_on:
      - meshcentral

networks:
  lab-network:
    driver: bridge

volumes:
  mysql_data: {}
  meshcentral_data: {}
