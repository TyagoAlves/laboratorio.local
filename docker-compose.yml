services:

  # ─── Database ───────────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: lab-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
    restart: unless-stopped
    networks:
      - lab-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ─── Guacamole Proxy Daemon ─────────────────────────────────
  guacd:
    image: guacamole/guacd
    container_name: lab-guacd
    restart: unless-stopped
    networks:
      - lab-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── Guacamole Web Application ──────────────────────────────
  guacamole:
    image: guacamole/guacamole
    container_name: lab-guacamole
    depends_on:
      guacd:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: mysql
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole_pass}
      # LDAP Authentication
      LDAP_HOSTNAME: windows
      LDAP_PORT: "389"
      LDAP_ENCRYPTION_METHOD: none
      LDAP_USER_BASE_DN: DC=laboratorio,DC=local
      LDAP_USERNAME_ATTRIBUTE: sAMAccountName
      LDAP_SEARCH_BIND_DN: CN=Administrator,CN=Users,DC=laboratorio,DC=local
      LDAP_SEARCH_BIND_PASSWORD: ${ADMIN_PASSWORD:-SenhaForte@2026}
      LDAP_GROUP_BASE_DN: DC=laboratorio,DC=local
      LDAP_GROUP_NAME_ATTRIBUTE: cn
      LDAP_MEMBER_ATTRIBUTE: member
      LDAP_GROUP_SEARCH_FILTER: "(objectClass=group)"
      LDAP_NESTED_GROUPS: "true"
    restart: unless-stopped
    networks:
      - lab-network

  # ─── Windows Server 2022 (Domain Controller) ───────────────
  windows:
    image: dockurr/windows
    container_name: lab-windows
    environment:
      RAM_SIZE: ${RAM_SIZE:-3G}
      CPU_CORES: ${CPU_CORES:-2}
      DISK_SIZE: ${DISK_SIZE:-60G}
      VERSION: win2022
      USERNAME: Administrator
      PASSWORD: ${ADMIN_PASSWORD:-SenhaForte@2026}
      ARGUMENTS: >-
        -netdev user,id=net_extra,hostfwd=tcp::88-:88,hostfwd=tcp::389-:389,
        hostfwd=tcp::25-:25,hostfwd=tcp::110-:110,hostfwd=tcp::143-:143
        -device virtio-net-pci,netdev=net_extra
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - 3389:3389    # RDP
      - 8006:8006    # Web UI (KVM)
      - 88:88        # Kerberos
      - 389:389      # LDAP
      - 25:25        # SMTP
      - 110:110      # POP3
      - 143:143      # IMAP
    volumes:
      - windows_disk:/storage
      - ./oem:/oem
    stop_grace_period: 120s
    restart: unless-stopped
    networks:
      - lab-network

  # ─── Mail Server (Postfix + Dovecot + LDAP) ────────────────
  mailserver:
    image: docker.io/mailserver/docker-mailserver:latest
    container_name: lab-mailserver
    hostname: mail
    domainname: laboratorio.local
    environment:
      ACCOUNT_PROVISIONER: LDAP
      LDAP_SERVER_HOST: ldap://windows
      LDAP_SEARCH_BASE: DC=laboratorio,DC=local
      LDAP_BIND_DN: CN=Administrator,CN=Users,DC=laboratorio,DC=local
      LDAP_BIND_PW: ${ADMIN_PASSWORD:-SenhaForte@2026}
      LDAP_START_TLS: no
      LDAP_QUERY_FILTER_USER: (&(mail=%u)(objectClass=user)(!(userAccountControl:1.2.840.113556.1.4.803:=2)))
      LDAP_QUERY_FILTER_DOMAIN: (&(|(mail=*@%d)(mailAlias=*@%d))(objectClass=user))
      LDAP_QUERY_FILTER_GROUP: (&(member=%s)(objectClass=group))
      LDAP_QUERY_FILTER_ALIAS: (&(mailAlias=%s)(objectClass=user))
      DOVECOT_AUTH_BIND: "yes"
      DOVECOT_USER_FILTER: (&(mail=%u)(objectClass=user)(!(userAccountControl:1.2.840.113556.1.4.803:=2)))
      DOVECOT_PASS_ATTRS: uid=user,userPassword=password
      DOVECOT_USER_ATTRS: =uid=5000,=gid=5000,=home=/var/mail/%d/%n/home/,=mail=maildir:/var/mail/%d/%n/
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
    volumes:
      - mail_data:/var/mail
      - mail_state:/var/mail-state
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: unless-stopped
    stop_grace_period: 120s
    depends_on:
      - windows
    networks:
      - lab-network

  # ─── Webmail (Roundcube) ───────────────────────────────────
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: lab-roundcube
    environment:
      ROUNDCUBEMAIL_DB_TYPE: sqlite
      ROUNDCUBEMAIL_SKIP_DB_INIT: "false"
      ROUNDCUBEMAIL_USERNAME_DOMAIN: laboratorio.local
    ports:
      - "8081:80"
    volumes:
      - ./roundcube/db:/var/roundcube/db
      - ./roundcube/config/config.inc.php:/var/www/html/config/config.inc.php
    restart: unless-stopped
    depends_on:
      - mailserver
    networks:
      - lab-network

  # ─── Linux Desktop (optional) ──────────────────────────────
  linux-desktop:
    image: dorowu/ubuntu-desktop-lxde-vnc:latest
    container_name: lab-linux
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-SenhaForte@2026}
      RESOLUTION: 1280x720
    ports:
      - "5900"
    restart: unless-stopped
    networks:
      - lab-network

  # ─── MeshCentral (optional) ────────────────────────────────
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: lab-meshcentral
    environment:
      HOSTNAME: localhost
      PORT: "443"
      RIGHTS: "1"
    ports:
      - "4430:443"
      - "3000:3000"
    volumes:
      - meshcentral_data:/opt/meshcentral/meshcentral-data
    restart: unless-stopped
    networks:
      - lab-network
    profiles:
      - meshcentral

  # ─── Cloudflare Tunnel (optional) ──────────────────────────
  cloudflared:
    image: cloudflare/cloudflared
    container_name: lab-cloudflared
    command: tunnel --url http://guacamole:8080/guacamole/
    restart: unless-stopped
    networks:
      - lab-network
    depends_on:
      - guacamole
    profiles:
      - tunnel

networks:
  lab-network:
    driver: bridge

volumes:
  mysql_data: {}
  windows_disk: {}
  mail_data: {}
  mail_state: {}
  meshcentral_data: {}
